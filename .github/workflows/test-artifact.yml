name: Test Artifact Upload

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Create dummy file
        run: echo "test" > /tmp/test.txt

      - name: Upload with name "activation"
        uses: actions/upload-artifact@v4
        with:
          name: activation
          path: /tmp/test.txt

      - name: Upload with name "test-artifact"
        uses: actions/upload-artifact@v4
        with:
          name: test-artifact
          path: /tmp/test.txt
